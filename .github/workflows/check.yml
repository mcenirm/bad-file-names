name: Check

on:
  workflow_dispatch:

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build

      - name: Build
        run: cmake --build ${{github.workspace}}/build

      - name: Run (Windows)
        if: runner.os == 'Windows'
        run: |
          cd ${{runner.temp}}
          & ${{github.workspace}}\build\Debug\badfilenames.exe | Out-Null

      - name: Run (not Windows)
        if: runner.os != 'Windows'
        run: |
          cd ${{runner.temp}}
          ${{github.workspace}}/build/badfilenames > /dev/null
