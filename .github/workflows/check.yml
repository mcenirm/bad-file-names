name: Check

on:
  workflow_dispatch:

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build

      - name: Build
        run: cmake --build ${{github.workspace}}/build

      - name: Run
        run: mkdir ${{github.workspace}}/test && cd ${{github.workspace}}/test && ${{github.workspace}}/build/badfilenames

      - name: Show everything (Windows)
        if: runner.os == 'Windows'
        run: Get-ChildItem -Force -Recurse ${{github.workspace}}/test

      - name: Show everything (not Windows)
        if: runner.os != 'Windows'
        run: ls -alR ${{github.workspace}}/test
